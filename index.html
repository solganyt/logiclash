<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiClash ⚔️</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="nav-logo"><img src="assets/images/Logo.png" alt="Logo" width="300"></a>
            <div class="nav-links">
                <a href="#" id="navbtn-test">JOUER</a>
                <a href="#" id="navbtn-test">CLASSEMENT</a>
                <a href="#" id="navbtn-test">PROFIL</a>
            </div>
        </nav>
    </header>
</body>

<style>
    @font-face {font-family:"GROBOLD";src:url("GROBOLD.eot?") format("eot"),url("GROBOLD.woff") format("woff"),url("GROBOLD.ttf") format("truetype"),url("GROBOLD.svg#GROBOLD") format("svg");font-weight:normal;font-style:normal;}

    body {
        background-color: rgb(24, 5, 59);
        margin: 0;
    }

    nav {
    width: 100%;
    background-color: rgb(14, 2, 32);
    margin: 0;
    display: flex;
    align-items: center;
    }

    .nav-logo {
        flex-shrink: 0;
    }

    .nav-links {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        text-align: center;
        font-size: 35px;
        padding: 4px 5px;
        font-family: 'Grobold';
        position: relative;
    }

    .nav-links a::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 3px;
        background-color: white;
        border-radius: 2px;
        transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
        width: 100%;
    }

    nav a img {
        display: block;
        margin-left: 20px;
        margin-top: 20px;
        margin-bottom: 20px;
        transition: .3s;
    }

    nav a img:hover {
        transform: scale(107%);
    }
</style>
</html>
